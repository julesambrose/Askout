<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hi You!!</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="index.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow-x: hidden;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .Hey {
            margin-bottom: 30px;
        }

        .Hey label {
            font-size: 35px;
            font-weight: bold;
        }

        .Hey button {
            font-size: 35px;
            background-color: #FFB8BF;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px;
        }

        /* Moving No Button */
        #moveButton {
            position: fixed;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        /* Slideshow */
        .slideshow-container {
            max-width: 350px;
            width: 100%;
        }

        .mySlides {
            display: none;
        }

        .mySlides img {
            width: 100%;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="main">
        <div class="Hey">
            <h2></h2>

            <label>Do you wanna go out?</label>
            <br><br>

            <a href="page3.html">
                <button>Yes</button>
            </a>

            <button id="moveButton"
                    onmouseover="moveButton()"
                    onmousedown="moveButton()"
                    ontouchstart="moveButton()">
                No
            </button>

            <audio id="moveSound" preload="auto">
                <source src="Aww.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="slideshow-container">
            <div class="mySlides">
                <img src="cutu1.png" alt="Image 1">
            </div>

            <div class="mySlides">
                <img src="cutu2.png" alt="Image 2">
            </div>
        </div>
    </div>

    <script>
        // Initial button position
        window.onload = function () {
            const button = document.getElementById("moveButton");

            button.style.left = "60%";
            button.style.top = "55%";
        };

        // Move button to a random place
        function moveButton() {
            const button = document.getElementById("moveButton");

            const maxX = window.innerWidth - button.offsetWidth - 20;
            const maxY = window.innerHeight - button.offsetHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            button.style.left = randomX + "px";
            button.style.top = randomY + "px";

            playMoveSound();
        }

        // Play sound effect
        function playMoveSound() {
            const sound = document.getElementById("moveSound");

            sound.currentTime = 0;

            sound.play().catch(function () {
                // Ignore autoplay restrictions
            });
        }

        // Slideshow functionality
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            const slides = document.getElementsByClassName("mySlides");

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slideIndex++;

            if (slideIndex > slides.length) {
                slideIndex = 1;
            }

            slides[slideIndex - 1].style.display = "block";

            setTimeout(showSlides, 800);
        }
    </script>

</body>
</html>
