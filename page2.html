<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi You!!</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #583759;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to top, #FDEEF4, #F98B88);
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .Hey label {
            font-size: 35px;
            font-weight: bold;
        }

        #buttonArea {
            position: relative;
            width: 450px;
            height: 180px;
            margin: 20px auto;
        }

        .yes-btn,
        #moveButton {
            font-size: 35px;
            background-color: #FFB8BF;
            color: #583759;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .yes-btn {
            position: absolute;
            left: 80px;
            top: 60px;
        }

        #moveButton {
            position: absolute;
            left: 250px;
            top: 60px;
            transition: left 0.15s ease, top 0.15s ease;
        }

        .slideshow-container {
            width: 300px;
        }

        .mySlides {
            display: none;
            mix-blend-mode: multiply;
            opacity: 0.9;
        }

        .mySlides img {
            width: 100%;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="main">

        <div class="Hey">
            <label>Do you wanna go out?</label>

            <div id="buttonArea">

                <a href="page3.html">
                    <button class="yes-btn">Yes</button>
                </a>

                <button
                    id="moveButton"
                    onmouseover="moveButton()"
                    ontouchstart="moveButton()"
                    onmousedown="moveButton()">
                    No
                </button>

            </div>

            <audio id="moveSound" preload="auto">
                <source src="Aww.mp3" type="audio/mp3">
            </audio>
        </div>

        <div class="slideshow-container">
            <div class="mySlides">
                <img src="cutu1.png" alt="Image 1">
            </div>

            <div class="mySlides">
                <img src="cutu2.png" alt="Image 2">
            </div>
        </div>

    </div>

    <script>
        function moveButton() {
            const button = document.getElementById("moveButton");
            const area = document.getElementById("buttonArea");

            const maxX = area.clientWidth - button.offsetWidth;
            const maxY = area.clientHeight - button.offsetHeight;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            button.style.left = randomX + "px";
            button.style.top = randomY + "px";

            playMoveSound();
        }

        function playMoveSound() {
            const sound = document.getElementById("moveSound");

            sound.currentTime = 0;

            sound.play().catch(() => {
                // Ignore autoplay restrictions
            });
        }

        let slideIndex = 0;
        showSlides();

        function showSlides() {
            const slides = document.getElementsByClassName("mySlides");

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slideIndex++;

            if (slideIndex > slides.length) {
                slideIndex = 1;
            }

            slides[slideIndex - 1].style.display = "block";

            setTimeout(showSlides, 800);
        }
    </script>

</body>
</html>
